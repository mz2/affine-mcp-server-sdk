name: Build and Upload SDK

on:
  push:
    branches:
      - latest
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., latest)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

# Each architecture is built on a runner of its OWN architecture. The SDK
# bundles a Node.js binary matching the build host, so cross-building would
# ship the wrong-arch node (see sdkcraft.yaml). Building natively keeps each
# artifact correct.
jobs:
  amd64:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    with:
      platforms: '["amd64"]'
      platform-flag: "--build-for"
      risk: "edge"
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_STAGING }}

  arm64:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    with:
      platforms: '["arm64"]'
      platform-flag: "--build-for"
      risk: "edge"
      # arm64 self-hosted runner (same label as build.yml / canonical/sdkcraft).
      runs-on: '["self-hosted-linux-arm64-noble-xlarge"]'
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_STAGING }}
