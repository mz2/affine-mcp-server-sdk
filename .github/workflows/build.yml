name: Build SDK

on:
  pull_request:
    branches:
      - latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

# Validate the build for each architecture on a native runner. `sdkcraft pack`
# builds the platform whose build-on matches the runner, so the amd64 job
# builds amd64 and the arm64 job builds arm64.
jobs:
  amd64:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@main

  arm64:
    uses: canonical/sdkcraft-actions/.github/workflows/build.yml@main
    with:
      # arm64 self-hosted runner (Canonical pool, same label canonical/sdkcraft
      # uses). amd64 above uses the action's default x64 pool.
      runs-on: '["self-hosted-linux-arm64-noble-xlarge"]'
